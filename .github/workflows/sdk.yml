name: Build RPI5 SDK + Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sdk:
    runs-on: ubuntu-24.04

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl ccache \
            libelf-dev python3-pyelftools zstd jq

      - name: Clone DOTYPI5
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth=1 https://x-access-token:${GH_PAT}@github.com/AW1Kdev/DOTYPI5.git wrt

      - name: Update Feeds
        run: |
          cd wrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Config
        run: |
          cd wrt

          if [ -f configs/RPI5M.txt ]; then
            cp configs/RPI5M.txt .config
          elif [ -f RPI5M.txt ]; then
            cp RPI5M.txt .config
          fi

          make defconfig

      - name: Build Tools
        run: |
          cd wrt
          make tools/install -j$(nproc) || make tools/install -j1 V=s

      - name: Build Toolchain
        run: |
          cd wrt
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

      - name: Build SDK
        run: |
          cd wrt
          make target/sdk/compile -j$(nproc) || make target/sdk/compile -j1 V=s

      - name: Prepare SDK
        run: |
          mkdir -p release

          SDK_FILE=$(find wrt/bin/targets/bcm27xx/bcm2712/ -name "*sdk*.tar.zst" | head -n1)

          if [ -z "$SDK_FILE" ]; then
            echo "❌ SDK not found!"
            exit 1
          fi

          cp "$SDK_FILE" release/
          cp wrt/.config release/config.buildinfo || true

          echo "SDK_FILE=$SDK_FILE" >> $GITHUB_ENV

      - name: Set Release Tag
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          echo "TAG=SDK-RPI5-K6.12-$DATE" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: RPI5 SDK K6.12 (${{ env.TAG }})
          body: |
            Auto build SDK for RPI5 (bcm2712)
            Kernel: 6.12
            Source: DOTYPI5
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
