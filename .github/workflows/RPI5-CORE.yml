name: RPI5-CORE

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: true

    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
        default: ""
      RPI5_TEST:
        required: false
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_PAT: ${{ secrets.GH_PAT }}
  WRT_CONFIG: ${{ inputs.WRT_CONFIG }}
  WRT_IP: ${{ inputs.WRT_IP }}
  WRT_REPO: ${{ inputs.WRT_REPO }}
  WRT_BRANCH: ${{ inputs.WRT_BRANCH }}
  WRT_SOURCE: ${{ inputs.WRT_SOURCE }}
  WRT_PACKAGE: ${{ inputs.WRT_PACKAGE }}
  RPI5_TEST: ${{ inputs.RPI5_TEST }}

jobs:
  core:
    name: ${{ inputs.WRT_SOURCE }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Projects
        uses: actions/checkout@v4

      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox || true
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean

          sudo -E apt -yqq install \
            dos2unix libfuse-dev \
            build-essential clang llvm lld cmake ninja-build \
            python3 python3-pip git curl wget unzip rsync file \
            libssl-dev pkg-config zlib1g-dev

          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Kuala_Lumpur"

      - name: Free Disk And Add Swap
        if: env.RPI5_TEST != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true

          sudo swapoff -a || true
          sudo fallocate -l 16G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=16384
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          free -h
          df -h

      - name: Initialize Values
        run: |
          echo "WRT_DATE=$(TZ=Asia/Kuala_Lumpur date +"%y.%m.%d-%H.%M.%S")" >> "$GITHUB_ENV"
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> "$GITHUB_ENV"
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> "$GITHUB_ENV"

          if [ -f "./Config/$WRT_CONFIG.txt" ]; then
            TARGET_NAME="$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' "./Config/$WRT_CONFIG.txt" || true)"
          else
            TARGET_NAME="unknown"
          fi

          echo "WRT_TARGET=${TARGET_NAME:-unknown}" >> "$GITHUB_ENV"
          echo "WRT_KVER=none" >> "$GITHUB_ENV"
          echo "WRT_LIST=none" >> "$GITHUB_ENV"
          echo "BUILD_DEVICE=unknown" >> "$GITHUB_ENV"

      - name: Clone Source Code
        run: |
          rm -rf ./wrt

          if [ -z "$GH_PAT" ]; then
            echo "ERROR: GH_PAT secret is empty or not set."
            exit 1
          fi

          CLEAN_REPO="${WRT_REPO#https://github.com/}"
          CLEAN_REPO="${CLEAN_REPO#http://github.com/}"
          CLEAN_REPO="${CLEAN_REPO#github.com/}"

          REPO_URL="https://x-access-token:${GH_PAT}@github.com/${CLEAN_REPO}"

          echo "Cloning private repo..."
          git clone --depth=1 --single-branch --branch "$WRT_BRANCH" "$REPO_URL" ./wrt/

          cd ./wrt/
          echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> "$GITHUB_ENV"

          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Normalize Scripts
        run: |
          find ./ -type f \( -iname "*.txt" -o -iname "*.sh" \) -exec dos2unix {} \; || true
          find ./ -type f \( -iname "*.sh" -o -path "*/Scripts/*" -o -path "*/scripts/*" \) -exec chmod +x {} \; || true

      - name: Check Cache
        id: check-cache
        if: env.RPI5_TEST != 'true'
        uses: actions/cache@v4
        with:
          key: ccache-${{ env.WRT_CONFIG }}-${{ env.WRT_INFO }}-${{ env.WRT_HASH }}
          restore-keys: |
            ccache-${{ env.WRT_CONFIG }}-${{ env.WRT_INFO }}
          path: |
            ./wrt/.ccache

      - name: Update Feeds
        run: |
          cd ./wrt/
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/
          chmod +x "$GITHUB_WORKSPACE/Scripts/Handles.sh"
          "$GITHUB_WORKSPACE/Scripts/Handles.sh"

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [ ! -f "$GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt" ]; then
            echo "ERROR: Config file not found: $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt"
            exit 1
          fi

          cat "$GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt" >> .config

          chmod +x "$GITHUB_WORKSPACE/Scripts/Settings.sh"
          "$GITHUB_WORKSPACE/Scripts/Settings.sh"

          make defconfig -j"$(nproc)"

      - name: Pre-Build Device Check
        run: |
          cd ./wrt/

          TARGET_BOARD="$(grep -oP '^CONFIG_TARGET_BOARD="\K[^"]+' .config || true)"
          TARGET_SUBTARGET="$(grep -oP '^CONFIG_TARGET_SUBTARGET="\K[^"]+' .config || true)"
          TARGET_PROFILE="$(grep -oP '^CONFIG_TARGET_PROFILE="\K[^"]+' .config || true)"

          echo "Selected Config : $WRT_CONFIG"
          echo "Login IP        : $WRT_IP"
          echo "Target Board    : $TARGET_BOARD"
          echo "Target Subtarget: $TARGET_SUBTARGET"
          echo "Target Profile  : $TARGET_PROFILE"
          echo "Build Device    : ${TARGET_BOARD}/${TARGET_SUBTARGET}/${TARGET_PROFILE}"
          echo ""

          echo "Target Flags:"
          grep -E '^CONFIG_TARGET_(x86|bcm27xx|qualcommax|mediatek|rockchip)' .config || true
          echo ""

          echo "Raspberry Pi Device:"
          grep -E 'DEVICE_rpi|DEVICE_bcm27xx' .config || true
          echo ""

          echo "BUILD_DEVICE=${TARGET_BOARD}/${TARGET_SUBTARGET}/${TARGET_PROFILE}" >> "$GITHUB_ENV"

          if grep -q '^CONFIG_TARGET_x86=y' .config; then
            echo "ERROR: Wrong target detected! This build is x86, not Raspberry Pi 5."
            exit 1
          fi

          if ! grep -q '^CONFIG_TARGET_bcm27xx_bcm2712_DEVICE_rpi-5=y' .config; then
            echo "ERROR: Raspberry Pi 5 target not detected!"
            exit 1
          fi

      - name: Download Packages
        if: env.RPI5_TEST != 'true'
        run: |
          cd ./wrt/
          make download -j"$(nproc)"

      - name: Clean Rust Host
        if: env.RPI5_TEST != 'true'
        run: |
          cd ./wrt/
          rm -rf dl/cargo
          rm -rf build_dir/target-*/host/rustc-*-src
          rm -rf staging_dir/hostpkg/lib/rustlib
          make package/feeds/packages/rust/host/clean V=s || true

      - name: Compile Firmware
        if: env.RPI5_TEST != 'true'
        run: |
          cd ./wrt/
          make -j2 || make -j1 V=s

      - name: Show Build Output Device
        run: |
          cd ./wrt/

          echo "Build Device : $BUILD_DEVICE"
          echo "WRT Target   : $WRT_TARGET"
          echo ""

          echo "Output folders:"
          find ./bin/targets/ -maxdepth 3 -type d 2>/dev/null || true

          echo ""
          echo "Firmware files:"
          find ./bin/targets/ -type f 2>/dev/null || true

      - name: Machine Information
        run: |
          cd ./wrt/
          echo "======================="
          lscpu | grep -E "name|Core|Thread" || true
          echo "======================="
          free -h
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        shell: bash
        run: |
          set -e
          cd ./wrt/

          echo "== Package Firmware =="
          mkdir -p ./upload/

          if [ -f ./.config ]; then
            cp -f ./.config "./upload/Config-${WRT_CONFIG}-${WRT_DATE}.txt"
          else
            echo "WARNING: .config not found"
          fi

          if [ "$RPI5_TEST" = "true" ]; then
            echo "TEST mode enabled. Skip firmware packaging."
            echo "Upload folder:"
            find ./upload/ -type f -maxdepth 1 -print || true
            exit 0
          fi

          if [ ! -d ./bin/targets ]; then
            echo "ERROR: ./bin/targets not found."
            echo "Firmware compile may have failed or no image was generated."
            exit 1
          fi

          echo "Detected firmware output:"
          find ./bin/targets/ -type f -print || true
          echo ""

          KVER="$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -h -oP '^kernel - \K[\d\.]+' {} \; | head -n1 || true)"
          LIST="$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -h -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ' || true)"

          echo "WRT_KVER=${KVER:-none}" >> "$GITHUB_ENV"
          echo "WRT_LIST=${LIST:-none}" >> "$GITHUB_ENV"

          echo "Copy important metadata files..."
          find ./bin/targets/ -type f \( \
            -name "config.buildinfo" -o \
            -name "feeds.buildinfo" -o \
            -name "version.buildinfo" -o \
            -name "*.manifest" -o \
            -name "profiles.json" -o \
            -name "sha256sums" \
          \) -exec cp -f {} ./upload/ \; || true

          echo "Copy Raspberry Pi 5 firmware images..."
          find ./bin/targets/ -type f \( \
            -name "*rpi-5*factory*.img.gz" -o \
            -name "*rpi-5*sysupgrade*.img.gz" -o \
            -name "*rpi-5*.img.gz" \
          \) -exec cp -f {} ./upload/ \; || true

          echo "Copy other generated images if no rpi-5 image found..."
          if ! find ./upload/ -type f -name "*rpi-5*.img.gz" | grep -q .; then
            find ./bin/targets/ -type f \( \
              -name "*.img.gz" -o \
              -name "*.bin" -o \
              -name "*.itb" -o \
              -name "*.tar" -o \
              -name "*.tar.gz" -o \
              -name "*.tar.zst" \
            \) -exec cp -f {} ./upload/ \; || true
          fi

          echo ""
          echo "Final upload files:"
          find ./upload/ -maxdepth 1 -type f -printf "%f\n" | sort || true

          if ! find ./upload/ -maxdepth 1 -type f | grep -q .; then
            echo "ERROR: Upload folder is empty."
            exit 1
          fi

      - name: Upload To Artifact
        if: env.RPI5_TEST != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: RPI5-FULL-BIN
          path: ./wrt/bin/
          retention-days: 7

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: RPI5-UPLOAD
          path: ./wrt/upload/
          retention-days: 7

      - name: Release Firmware
        if: env.RPI5_TEST != 'true'
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ env.WRT_CONFIG }}-${{ env.WRT_INFO }}-${{ env.WRT_BRANCH }}-${{ env.WRT_DATE }}
          files: ./wrt/upload/*.*
          body: |
            This is a Raspberry Pi 5 firmware package.
            Please make sure to choose the correct firmware for your device.

            Source: ${{ env.WRT_REPO }}
            Branch: ${{ env.WRT_BRANCH }}
            Commit: ${{ env.WRT_HASH }}
            Config: ${{ env.WRT_CONFIG }}
            Platform: ${{ env.WRT_TARGET }}
            Build Device: ${{ env.BUILD_DEVICE }}
            Login IP: ${{ env.WRT_IP }}
            Kernel Version: ${{ env.WRT_KVER }}
